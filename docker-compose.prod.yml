version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      args:
        PYTHON_BASE_IMAGE: ${BACKEND_PYTHON_BASE_IMAGE:-python:3.12-slim}
        DEBIAN_MIRROR: ${BACKEND_DEBIAN_MIRROR:-https://mirrors.aliyun.com/debian}
        DEBIAN_SECURITY_MIRROR: ${BACKEND_DEBIAN_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}
        INSTALL_OPTIONAL: "true"
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    restart: unless-stopped
    expose:
      - "8100"
    volumes:
      - ./backend/data:/app/data
      - ./backend/tmp:/app/tmp
      - ./backend/.model_cache:/app/.model_cache
    environment:
      - HF_HOME=/app/.model_cache/huggingface
      - TIMESFM_CACHE_DIR=/app/.model_cache/timesfm

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${FRONTEND_NODE_BASE_IMAGE:-node:22-alpine}
        NGINX_BASE_IMAGE: ${FRONTEND_NGINX_BASE_IMAGE:-nginx:1.27-alpine}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
