services:
  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8100
    ports:
      - "8100:8100"
    volumes:
      - ./backend/data:/app/data
      - ./backend/.model_cache:/app/.model_cache
    environment:
      - HF_HOME=/app/.model_cache/huggingface
      - TIMESFM_CACHE_DIR=/app/.model_cache/timesfm

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
